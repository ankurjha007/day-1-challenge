<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="day1.css">
  
</head>
<body>
      <div class="main">

    <div data-key="65" class="abc">
      <kbd>A</kbd>
      <span class="sound">clap</span>
    </div>

    <div data-key="83" class="abc">
      <kbd>S</kbd>
      <span class="sound">hihat</span>
    </div>

    <div data-key="68" class="abc">
      <kbd>D</kbd>
      <span class="sound">kick</span>
    </div>

    <div data-key="70" class="abc">
      <kbd>F</kbd>
      <span class="sound">openhat</span>
    </div>

    <div data-key="71" class="abc">
      <kbd>G</kbd>
      <span class="sound">boom</span>
    </div>

    <div data-key="72" class="abc">
      <kbd>H</kbd>
      <span class="sound">ride</span>
    </div>

    <div data-key="74" class="abc">
      <kbd>J</kbd>
      <span class="sound">snare</span>
    </div>

    <div data-key="75" class="abc">
      <kbd>K</kbd>
      <span class="sound">tom</span>
    </div>

    <div data-key="76" class="abc">
      <kbd>L</kbd>
      <span class="sound">tink</span>
    </div>

  </div>
   <audio data-key="65"  src="./sound/tom.wav"></audio>
   <audio data-key="83" src="./sound/tink.wav"></audio>
   <audio data-key="68" src="./sound/snare.wav"></audio>
   <audio data-key="70" src="./sound/ride.wav"></audio>
   <audio data-key="71" src="./sound/openhat.wav"></audio>
   <audio data-key="72" src="./sound/kick.wav"></audio>
   <audio data-key="74" src="./sound/hihat.wav"></audio>
   <audio data-key="75" src="./sound/clap.wav"></audio>
   <audio data-key="76" src="./sound/boom.wav"></audio>
  

   <script src="script.js"></script>

    
</body>
</html>
